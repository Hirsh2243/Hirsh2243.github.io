<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nautical Operations Tool</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.1/leaflet.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.1/leaflet.css" />
</head>
<body>
    <h1>Nautical Operations Tool</h1>
    <div id="map" style="height: 500px;"></div>
    <script>
        var map = L.map('map').setView([0, 0], 2);

        // Adding OpenSeaMap nautical chart
        L.tileLayer('https://tiles.openseamap.org/seamark/{z}/{x}/{y}.png', {
            maxZoom: 18,
            attribution: 'Map data © OpenSeaMap contributors'
        }).addTo(map);

        // Marker management
        var markers = L.layerGroup().addTo(map);

        function addMarker(lat, lon) {
            let marker = L.marker([lat, lon]).addTo(markers);
            marker.bindPopup('Marker at ' + lat + ', ' + lon);
        }

        // Drawing tools
        var drawnItems = new L.FeatureGroup();
        map.addLayer(drawnItems);

        var drawControl = new L.Control.Draw({
            edit: {
                featureGroup: drawnItems
            }
        });
        map.addControl(drawControl);

        map.on('draw:created', function(e) {
            var layer = e.layer;
            drawnItems.addLayer(layer);
        });

        // MarineTraffic embed - Replace with your specific MarineTraffic iframe embed code
        var marineTrafficEmbed = '<iframe src="https://www.marinetraffic.com/en/ais/embed" width="600" height="400"></iframe>';
        document.body.innerHTML += marineTrafficEmbed;
    </script>
</body>
</html>
