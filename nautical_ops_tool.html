<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nautical Operations Tool</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        #map { height: 400px; }
        #chartContainer { width: 100%; height: 400px; }
    </style>
</head>
<body>
    <h1>Nautical Operations Tool</h1>
    <div id="map"></div>
    <canvas id="myChart"></canvas>
    <div>
        <input type="text" id="coordinate" placeholder="Enter coordinates (lat,lng)" />
        <button onclick="addMarker()">Add Marker</button>
    </div>
    <div id="markerList"></div>
    <script>
        // Leaflet map initialization
        var map = L.map('map').setView([51.505, -0.09], 13);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
        }).addTo(map);

        var markers = [];

        function addMarker() {
            var input = document.getElementById('coordinate').value;
            var coords = parseCoordinates(input);
            if (coords) {
                var marker = L.marker(coords).addTo(map);
                markers.push(marker);
                updateMarkerList();
            } else {
                alert('Invalid coordinates format.');
            }
        }

        function parseCoordinates(input) {
            var parts = input.split(',');
            if (parts.length === 2) {
                var lat = parseFloat(parts[0]);
                var lng = parseFloat(parts[1]);
                if (!isNaN(lat) && !isNaN(lng)) {
                    return [lat, lng];
                }
            }
            return null;
        }

        function updateMarkerList() {
            var markerList = document.getElementById('markerList');
            markerList.innerHTML = '';
            markers.forEach(function(marker, index) {
                markerList.innerHTML += `<div>Marker ${index + 1} <button onclick="deleteMarker(${index})">Delete</button></div>`;
            });
        }

        function deleteMarker(index) {
            map.removeLayer(markers[index]);
            markers.splice(index, 1);
            updateMarkerList();
        }

        // Chart.js visualization example
        var ctx = document.getElementById('myChart').getContext('2d');
        var myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Red', 'Blue', 'Yellow', 'Green', 'Purple', 'Orange'],
                datasets: [{
                    label: '# of Votes',
                    data: [12, 19, 3, 5, 2, 3],
                    backgroundColor: [
                        'rgba(255, 99, 132, 0.2)',
                        'rgba(54, 162, 235, 0.2)',
                        'rgba(255, 206, 86, 0.2)',
                        'rgba(75, 192, 192, 0.2)',
                        'rgba(153, 102, 255, 0.2)',
                        'rgba(255, 159, 64, 0.2)'
                    ],
                    borderColor: [
                        'rgba(255, 99, 132, 1)',
                        'rgba(54, 162, 235, 1)',
                        'rgba(255, 206, 86, 1)',
                        'rgba(75, 192, 192, 1)',
                        'rgba(153, 102, 255, 1)',
                        'rgba(255, 159, 64, 1)'
                    ],
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
    </script>
</body>
</html>
