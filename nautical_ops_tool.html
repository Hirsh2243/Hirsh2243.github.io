<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nautical Operations Tool</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js"></script>
</head>
<body>
    <div id="container">
        <div id="map"></div>
        <div id="controls">
            <h2>Controls</h2>
            <label for="point-label">Label Point:</label>
            <input type="text" id="point-label" placeholder="Enter label..."><br>
            <h3>GPS Coordinate Input</h3>
            <label for="gps-coord">Coordinates:</label>
            <input type="text" id="gps-coord" placeholder="Enter coordinates... (dec, dms, dmm)">
            <button id="add-point">Add Point</button>
        </div>
        <div id="statistics">
            <h2>Statistics</h2>
            <p id="stats-info">Statistics will be displayed here...</p>
        </div>
    </div>
    <script>
        // Your JavaScript logic for handling coordinates and adding points
        document.getElementById('add-point').onclick = function () {
            const label = document.getElementById('point-label').value;
            const coord = document.getElementById('gps-coord').value;
            // Add functionality to process label and coordinates
            console.log('Point added:', label, coord);
        };
    </script>
</body>
</html>
