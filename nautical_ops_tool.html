<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nautical Operations Tool</title>
    
    <!-- Leaflet CSS for map -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body { 
            font-family: Arial, sans-serif; 
            background-color: #f0f2f5;
        }
        
        .container {
            display: flex;
            height: 100vh;
            gap: 10px;
            padding: 10px;
        }
        
        #map {
            flex: 2;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        
        .right-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow-y: auto;
        }
        
        #operations-panel {
            padding: 15px;
            border: 1px solid #ddd;
            background-color: #fff;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            border-radius: 8px;
        }
        
        #operations-panel h2 {
            font-size: 18px;
            margin-bottom: 15px;
            color: #333;
        }
        
        .format-info {
            font-size: 11px;
            color: #888;
            margin-bottom: 10px;
            background-color: #f5f5f5;
            padding: 8px;
            border-left: 3px solid #4CAF50;
            border-radius: 3px;
        }
        
        .coordinate-input {
            margin: 12px 0;
            display: flex;
            flex-direction: column;
        }
        
        .coordinate-input label {
            font-weight: bold;
            margin-bottom: 5px;
            color: #555;
            font-size: 12px;
        }
        
        .coordinate-input input {
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 12px;
        }
        
        button {
            padding: 10px 15px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
            transition: background-color 0.3s;
        }
        
        button:hover {
            background-color: #45a049;
        }
        
        .event-stats {
            padding: 15px;
            background-color: #fff;
            border: 1px solid #ddd;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            border-radius: 8px;
        }
        
        .stat-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }
        
        .stat-item:last-child {
            border-bottom: none;
        }
        
        .stat-label {
            font-weight: bold;
            color: #555;
        }
        
        .stat-value {
            color: #4CAF50;
            font-weight: bold;
        }

        .markers-list {
            padding: 15px;
            background-color: #fff;
            border: 1px solid #ddd;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            border-radius: 8px;
            max-height: 200px;
            overflow-y: auto;
        }

        .markers-list h3 {
            font-size: 14px;
            margin-bottom: 10px;
            color: #333;
        }

        .marker-item {
            padding: 8px;
            margin-bottom: 5px;
            background-color: #f9f9f9;
            border-left: 3px solid #4CAF50;
            border-radius: 4px;
            font-size: 11px;
        }

        .marker-name {
            font-weight: bold;
            color: #333;
        }

        .marker-coords {
            color: #666;
            font-size: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="map"></div>
        <div class="right-panel">
            <div id="operations-panel">
                <h2>Add Maritime Points</h2>
                <div class="format-info">
                    <strong>GPS Formats:</strong><br>
                    • Decimal: 40.7128, -74.0060<br>
                    • DM: 40 42.768', -74 0.360'<br>
                    • DMS: 40 42' 46.08", -74 0' 21.6"
                </div>
                <div class="coordinate-input">
                    <label for="point-label">Point Label:</label>
                    <input type="text" id="point-label" placeholder="e.g., Buoy A, Vessel B">
                </div>
                <div class="coordinate-input">
                    <label for="distress">Distress:</label>
                    <input type="text" id="distress" placeholder="e.g., 40.7128, -74.0060">
                </div>
                <div class="coordinate-input">
                    <label for="fire">Fire:</label>
                    <input type="text" id="fire" placeholder="e.g., 40 42.768', -74 0.360'">
                </div>
                <div class="coordinate-input">
                    <label for="water">Water:</label>
                    <input type="text" id="water" placeholder="e.g., 40 42' 46.08\", -74 0' 21.6\"">
                </div>
                <div class="coordinate-input">
                    <label for="training">Training:</label>
                    <input type="text" id="training" placeholder="e.g., 40.7128, -74.0060">
                </div>
                <button onclick="createMarker()">Add Point</button>
            </div>
            
            <div class="markers-list">
                <h3>Active Points</h3>
                <div id="markersList">No points added yet</div>
            </div>

            <div class="event-stats">
                <h3>Statistics</h3>
                <div class="stat-item">
                    <span class="stat-label">Total Points:</span>
                    <span class="stat-value" id="totalEvents">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Distress:</span>
                    <span class="stat-value" id="distressCount">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Fire:</span>
                    <span class="stat-value" id="fireCount">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Water:</span>
                    <span class="stat-value" id="waterCount">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Training:</span>
                    <span class="stat-value" id="trainingCount">0</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    
    <script>
        // Initialize map
        const map = L.map('map').setView([40.7128, -74.0060], 4);
        
        // Add map tiles
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors',
            maxZoom: 19
        }).addTo(map);
        
        // Store all markers with custom labels
        let markers = [];
        let markerIdCounter = 0;
        
        // Event counters
        const events = {
            distress: 0,
            fire: 0,
            water: 0,
            training: 0
        };
        
        const markerIcons = {
            distress: L.divIcon({ className: 'distress-marker', html: '🚨', iconSize: [32, 32] }),
            fire: L.divIcon({ className: 'fire-marker', html: '🔥', iconSize: [32, 32] }),
            water: L.divIcon({ className: 'water-marker', html: '💧', iconSize: [32, 32] }),
            training: L.divIcon({ className: 'training-marker', html: '📚', iconSize: [32, 32] })
        };
        
        // Parse multiple GPS coordinate formats
        function parseCoordinate(coordString) {
            const parts = coordString.split(',').map(p => p.trim());
            if (parts.length !== 2) {
                throw new Error('Expected two coordinates separated by comma');
            }
            
            const lat = parseCoordinateValue(parts[0]);
            const lng = parseCoordinateValue(parts[1]);
            
            return [lat, lng];
        }
        
        function parseCoordinateValue(value) {
            value = value.trim();
            
            // Format 1: Decimal degrees (DD.DDDD)
            if (/^-?\d+\.?\d*$/.test(value)) {
                const decimal = parseFloat(value);
                if (isNaN(decimal)) throw new Error(`Invalid decimal degrees: ${value}`);
                return decimal;
            }
            
            // Format 2: Degrees Decimal Minutes (DD MM.MMM')
            const dmsDecimalMatch = value.match(/^(-?)(\d+)\s+([\d.]+)'$/);
            if (dmsDecimalMatch) {
                const sign = dmsDecimalMatch[1] === '-' ? -1 : 1;
                const degrees = parseInt(dmsDecimalMatch[2]);
                const decimalMinutes = parseFloat(dmsDecimalMatch[3]);
                
                if (isNaN(decimalMinutes)) throw new Error(`Invalid decimal minutes: ${value}`);
                
                return sign * (degrees + decimalMinutes / 60);
            }
            
            // Format 3: Degrees Minutes Seconds (DD MM'SS.S")
            const dmsMatch = value.match(/^(-?)(\d+)\s+(\d+)'\s+([\d.]+)"$/);
            if (dmsMatch) {
                const sign = dmsMatch[1] === '-' ? -1 : 1;
                const degrees = parseInt(dmsMatch[2]);
                const minutes = parseInt(dmsMatch[3]);
                const seconds = parseFloat(dmsMatch[4]);
                
                if (isNaN(seconds)) throw new Error(`Invalid seconds: ${value}`);
                
                return sign * (degrees + minutes / 60 + seconds / 3600);
            }
            
            throw new Error(`Could not parse coordinate: ${value}`);
        }
        
        function createMarker() {
            const customLabel = document.getElementById('point-label').value;
            const distressCoords = document.getElementById('distress').value;
            const fireCoords = document.getElementById('fire').value;
            const waterCoords = document.getElementById('water').value;
            const trainingCoords = document.getElementById('training').value;
            
            if (distressCoords) {
                addMarkerToMap(distressCoords, 'distress', customLabel || '🚨 Distress');
            }
            if (fireCoords) {
                addMarkerToMap(fireCoords, 'fire', customLabel || '🔥 Fire');
            }
            if (waterCoords) {
                addMarkerToMap(waterCoords, 'water', customLabel || '💧 Water');
            }
            if (trainingCoords) {
                addMarkerToMap(trainingCoords, 'training', customLabel || '📚 Training');
            }
            
            // Clear inputs
            document.getElementById('point-label').value = '';
            document.getElementById('distress').value = '';
            document.getElementById('fire').value = '';
            document.getElementById('water').value = '';
            document.getElementById('training').value = '';
            
            updateStats();
            renderMarkersList();
        }
        
        function addMarkerToMap(coordString, type, label) {
            try {
                const [lat, lng] = parseCoordinate(coordString);
                
                if (isNaN(lat) || isNaN(lng)) {
                    alert('Invalid coordinates.');
                    return;
                }
                
                if (lat < -90 || lat > 90 || lng < -180 || lng > 180) {
                    alert('Coordinates out of range.');
                    return;
                }
                
                const markerId = markerIdCounter++;
                const leafletMarker = L.marker([lat, lng], { 
                    icon: markerIcons[type],
                    title: label
                }).addTo(map).bindPopup(`<b>${label}</b><br>Lat: ${lat.toFixed(4)}<br>Lng: ${lng.toFixed(4)}`);
                
                markers.push({
                    id: markerId,
                    type: type,
                    lat: lat,
                    lng: lng,
                    label: label,
                    leafletMarker: leafletMarker
                });
                
                events[type]++;
                
            } catch (error) {
                alert('Error parsing coordinates: ' + error.message);
            }
        }

        function deleteMarker(markerId) {
            const index = markers.findIndex(m => m.id === markerId);
            if (index > -1) {
                const marker = markers[index];
                map.removeLayer(marker.leafletMarker);
                events[marker.type]--;
                markers.splice(index, 1);
                updateStats();
                renderMarkersList();
            }
        }

        function renderMarkersList() {
            const listContainer = document.getElementById('markersList');
            
            if (markers.length === 0) {
                listContainer.innerHTML = 'No points added yet';
                return;
            }
            
            listContainer.innerHTML = markers.map(marker => `
                <div class="marker-item">
                    <div class="marker-name">${marker.label}</div>
                    <div class="marker-coords">Lat: ${marker.lat.toFixed(4)}, Lng: ${marker.lng.toFixed(4)}</div>
                    <button onclick="deleteMarker(${marker.id})" style="padding: 3px 8px; font-size: 10px; margin-top: 5px;">Delete</button>
                </div>
            `).join('');
        }
        
        function updateStats() {
            const totalEvents = events.distress + events.fire + events.water + events.training;
            
            document.getElementById('totalEvents').textContent = totalEvents;
            document.getElementById('distressCount').textContent = events.distress;
            document.getElementById('fireCount').textContent = events.fire;
            document.getElementById('waterCount').textContent = events.water;
            document.getElementById('trainingCount').textContent = events.training;
        }
        
        // Initialize
        updateStats();
        renderMarkersList();
    </script>
</body>
</html>
