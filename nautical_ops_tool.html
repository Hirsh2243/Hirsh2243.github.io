<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nautical Operations Tool</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body {font-family: Arial, sans-serif;}
        #marker-list {margin-top: 20px;}
        #marker-list li {margin: 5px 0;}
    </style>
</head>
<body>
    <h1>Nautical Operations Tool</h1>
    <div id="map"></div>
    <ul id="marker-list"></ul>
    <script>
        let markers = [];

        function addMarker(lat, lng) {
            const marker = { lat, lng };
            markers.push(marker);
            renderMarkers();
        }

        function renderMarkers() {
            $('#marker-list').empty();
            markers.forEach((marker, index) => {
                $('#marker-list').append(`<li>Lat: ${marker.lat}, Lng: ${marker.lng} <button onclick='editMarker(${index})'>Edit</button> <button onclick='deleteMarker(${index})'>Delete</button></li>`);
            });
        }

        function editMarker(index) {
            const newLat = prompt('Enter new latitude:', markers[index].lat);
            const newLng = prompt('Enter new longitude:', markers[index].lng);
            if (newLat !== null && newLng !== null) {
                markers[index] = { lat: parseFloat(newLat), lng: parseFloat(newLng) };
                renderMarkers();
            }
        }

        function deleteMarker(index) {
            markers.splice(index, 1);
            renderMarkers();
        }

        $(document).ready(function() {
            // Example: add initial markers
            addMarker(40.7128, -74.0060); // New York
            addMarker(34.0522, -118.2437); // Los Angeles
        });
    </script>
</body>
</html>
