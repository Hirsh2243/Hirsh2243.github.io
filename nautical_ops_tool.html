<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nautical Operations Tool</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <h1>Nautical Operations Tool</h1>
    <div id="map"></div>
    <script>
        // Initialize map
        const map = L.map('map').setView([37.7749, -122.4194], 10);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);

        // Custom marker icons
        const distressIcon = L.icon({
            iconUrl: 'images/distress.png',
            iconSize: [25, 41],
            iconAnchor: [12, 41],
            popupAnchor: [1, -34]
        });

        const fireIcon = L.icon({
            iconUrl: 'images/fire.png',
            iconSize: [25, 41],
            iconAnchor: [12, 41],
            popupAnchor: [1, -34]
        });

        const waterIcon = L.icon({
            iconUrl: 'images/water.png',
            iconSize: [25, 41],
            iconAnchor: [12, 41],
            popupAnchor: [1, -34]
        });

        const trainingIcon = L.icon({
            iconUrl: 'images/training.png',
            iconSize: [25, 41],
            iconAnchor: [12, 41],
            popupAnchor: [1, -34]
        });

        // Add markers for maritime events
        const vesselsInDistress = L.marker([37.7749, -122.4194], {icon: distressIcon}).addTo(map).bindPopup('Vessel in distress.');
        const vesselsOnFire = L.marker([37.7740, -122.4294], {icon: fireIcon}).addTo(map).bindPopup('Vessel on fire.');
        const vesselsTakingOnWater = L.marker([37.7800, -122.4180], {icon: waterIcon}).addTo(map).bindPopup('Vessel taking on water.');
        const trainingAssets = L.marker([37.7760, -122.4185], {icon: trainingIcon}).addTo(map).bindPopup('USCG training assets.');

        // Legend
        const legend = L.control({position: 'bottomright'});
        legend.onAdd = function () {
            const div = L.DomUtil.create('div', 'info legend');
            div.innerHTML += '<i style="background: red;"></i> Vessels in distress<br>';
            div.innerHTML += '<i style="background: orange;"></i> Vessels on fire<br>';
            div.innerHTML += '<i style="background: blue;"></i> Vessels taking on water<br>';
            div.innerHTML += '<i style="background: green;"></i> USCG training assets<br>';
            return div;
        };
        legend.addTo(map);
    </script>
</body>
</html>
