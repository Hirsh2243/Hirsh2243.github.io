<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nautical Operations Tool</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            margin: 0; 
            padding: 20px; 
            position: relative;
        }
        #operations-panel {
            position: absolute;
            bottom: 20px;
            left: 20px;
            padding: 10px;
            border: 1px solid #ccc;
            background-color: #f9f9f9;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .coordinate-input {
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <h1>Nautical Operations Tool</h1>
    <div id="operations-panel">
        <h2>Input Maritime Event Coordinates</h2>
        <div class="coordinate-input">
            <label for="distress">Distress Coordinates:</label>
            <input type="text" id="distress" placeholder="Latitude, Longitude">
        </div>
        <div class="coordinate-input">
            <label for="fire">Fire Coordinates:</label>
            <input type="text" id="fire" placeholder="Latitude, Longitude">
        </div>
        <div class="coordinate-input">
            <label for="water">Water Coordinates:</label>
            <input type="text" id="water" placeholder="Latitude, Longitude">
        </div>
        <div class="coordinate-input">
            <label for="training">Training Coordinates:</label>
            <input type="text" id="training" placeholder="Latitude, Longitude">
        </div>
        <button onclick="createMarker()">Create Marker</button>
    </div>
    <script>
        function createMarker() {
            // Functionality for creating markers based on input coordinates
            const distressCoords = document.getElementById('distress').value;
            const fireCoords = document.getElementById('fire').value;
            const waterCoords = document.getElementById('water').value;
            const trainingCoords = document.getElementById('training').value;
            // Add marker creation logic here
            console.log('Markers created at:', distressCoords, fireCoords, waterCoords, trainingCoords);
        }
    </script>
</body>
</html>
